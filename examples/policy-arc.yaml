# examples/policy-arc.yaml
apiVersion: autoscaling.warmrunners.io/v1alpha1
kind: WarmRunnerPolicy
metadata:
  name: example-arc
  namespace: default
spec:
  github:
    owner: my-org
    repository: my-repo
    labels: [self-hosted, linux, x64]
    auth:
      secretRef: { name: gh-token, key: token }
  target:
    arc:
      runnerSet:
        name: prod-runners
        namespace: arc-system
  floor: { min: 0, max: 50 }
  schedule:
    - days: [Mon, Tue, Wed, Thu, Fri]
      from: "08:00"
      to:   "19:00"
      tz:   "UTC"
      base: 3
  queueRule:
    pollInterval: 30s
    cooldown: 2m
  # spec.predictor — codebase-aware Predictor (v0.2.0). Optional; omit to disable.
  # predictor:
  #   enabled: true
  #   workflowRefreshInterval: 5m
  #   maxRunsPerPoll: 50
  # spec.activity — activity-driven warm-floor signal (v0.3.0). Optional; omit to disable.
  # activity:
  #   enabled: true
  #   windowSeconds: 900
  #   botLoginDenylist: []   # appended to the built-in list, not replacing it
  # spec.dryRun — observe-only mode (v0.4.0). All signals still compute and
  # show in status + metrics; the controller never patches the backend.
  # Use to canary a new policy before it acts.
  # dryRun: true
