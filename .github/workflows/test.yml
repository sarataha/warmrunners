name: Tests

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', '.claude/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**', '.claude/**']

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: unit + envtest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      - name: Running Tests
        run: |
          go mod tidy
          make test

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
