name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: unit + envtest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
          cache: true

      # The envtest kube-apiserver/etcd/kubectl binaries (~hundreds of MB) are not
      # covered by setup-go's module cache. Key on go.sum since ENVTEST_K8S_VERSION
      # derives from the k8s.io/api version pinned there.
      - name: Cache envtest binaries
        uses: actions/cache@v4
        with:
          path: bin/k8s
          key: envtest-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: envtest-${{ runner.os }}-

      - name: Running Tests
        run: |
          go mod tidy
          make test

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
