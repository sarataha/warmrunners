name: Tests

on:
  push:
    paths-ignore: ['**.md', 'docs/**', '.claude/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**', '.claude/**']

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: unit + envtest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Running Tests
        run: |
          go mod tidy
          make test

      - name: govulncheck
        uses: golang/govulncheck-action@v1.0.4
        with:
          go-version-input: '1.25'
          go-package: ./...
