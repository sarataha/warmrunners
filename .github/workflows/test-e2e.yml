name: E2E Tests

# Heavy (spins up a Kind cluster + builds the image): runs nightly and on
# demand, not on every PR. PRs gate on the fast unit + envtest suite (Tests)
# and Lint. This is the standard test-pyramid split.
on:
  schedule:
    - cron: "0 3 * * *" # nightly 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-e2e:
    name: e2e (kind)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Clone the code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Running Test e2e
        run: |
          go mod tidy
          make test-e2e
