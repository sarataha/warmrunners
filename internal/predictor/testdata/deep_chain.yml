name: deep_chain
on:
  push:
jobs:
  a:
    runs-on: ubuntu-latest
    steps:
      - run: echo a
  b:
    needs: a
    runs-on: ubuntu-latest
    steps:
      - run: echo b
  c:
    needs: [a, b]
    runs-on: ubuntu-latest
    steps:
      - run: echo c
  d:
    needs:
      - c
    runs-on: ubuntu-latest
    steps:
      - run: echo d
